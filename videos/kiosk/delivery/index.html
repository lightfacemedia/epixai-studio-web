<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#080808" />
  <title>Your Story — epixAI Studio</title>
  <meta property="og:title" content="My epixAI Story" />
  <meta property="og:description" content="My personalized AI short film from epixAI Studio." />
  <meta property="og:type" content="video.other" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #FF6A00;
      --accent2:   #FF9A3C;
      --bg:        #080808;
      --bg2:       #111111;
      --bg3:       #1a1a1a;
      --border:    rgba(255,255,255,0.08);
      --text:      #FFFFFF;
      --muted:     rgba(255,255,255,0.45);
      --radius:    12px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── NOISE GRAIN OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── AMBIENT GLOW ─── */
    .glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(255,106,0,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ─── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 28px 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-img {
      height: 36px;
      width: auto;
      display: block;
    }

    /* ─── HERO LABEL ─── */
    .hero-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 11vw, 72px);
      letter-spacing: 3px;
      line-height: 1;
      text-align: center;
      margin: 24px 0 6px;
      background: linear-gradient(180deg, #fff 60%, rgba(255,255,255,0.4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ─── VIDEO PLAYER ─── */
    .video-wrap {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(255,106,0,0.08), 0 24px 60px rgba(0,0,0,0.7);
      aspect-ratio: 9 / 16;
      max-height: 72dvh;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* play overlay for first tap */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .play-overlay.hidden { opacity: 0; pointer-events: none; }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,106,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255,106,0,0.5);
    }

    .play-btn svg { margin-left: 5px; }

    /* ─── CTA DOWNLOAD ─── */
    .cta-row {
      width: 100%;
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    .btn-download {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-download:active { opacity: 0.85; transform: scale(0.98); }

    /* ─── SHARE SECTION ─── */
    .share-label {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 16px;
    }

    .share-label::before,
    .share-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .share-label span {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .share-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .share-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .share-btn:active { transform: scale(0.96); }

    .share-btn:hover {
      background: var(--bg3);
      border-color: rgba(255,255,255,0.15);
    }

    .share-btn .icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .share-btn.instagram .icon { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
    .share-btn.facebook  .icon { background: #1877F2; }
    .share-btn.snapchat  .icon { background: #FFFC00; }
    .share-btn.linkedin  .icon { background: #0A66C2; }
    .share-btn.copy      .icon { background: var(--bg3); border: 1px solid var(--border); }

    /* ─── COPY CONFIRM ─── */
    .copy-confirm {
      position: absolute;
      inset: 0;
      background: rgba(255,106,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: var(--radius);
    }

    .copy-confirm.show { opacity: 1; }

    /* ─── NATIVE SHARE (mobile) ─── */
    .native-share-row {
      width: 100%;
      margin-top: 10px;
      display: none;
    }

    .btn-native-share {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-native-share:active { background: var(--bg3); }

    /* ─── FOOTER ─── */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ─── ERROR STATE ─── */
    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .error-state.visible { display: flex; }
    .video-wrap.hidden { display: none; }

    .error-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .error-body {
      font-size: 14px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.6;
    }

    /* ─── LOADING SHIMMER ─── */
    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shimmer.hidden { display: none; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (min-width: 480px) {
      .video-wrap { max-height: 80dvh; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="page">

  <!-- HEADER -->
  <header>
    <a href="https://epixai.studio" class="logo" target="_blank" rel="noopener">
      <img class="logo-img" src="./logo.png" alt="epixAI Studio" />

  <!-- HERO LABEL -->

  <div class="video-wrap" id="videoWrap">

<script>
(function () {
  // ── PARSE PARAMS ──────────────────────────────────────────────
  const params    = new URLSearchParams(window.location.search);
  const videoUrl  = params.get('video') || params.get('v') || '';
  const guestName = params.get('name') || '';
  const expiresTs = parseInt(params.get('expires') || '0', 10);
  const pageUrl   = window.location.href;

  // ── EXPIRY COUNTDOWN ──────────────────────────────────────────
  const expiryEl = document.getElementById('expiryNotice');
  if (expiresTs) {
    const now      = Date.now();
    const expireMs = expiresTs * 1000; // param is unix seconds
    const diffMs   = expireMs - now;
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
    if (diffMs <= 0) {
      expiryEl.textContent = 'This link has expired.';
      expiryEl.style.color = '#FF6A00';
    } else if (diffDays === 1) {
      expiryEl.textContent = 'Your link expires today.';
      expiryEl.style.color = '#FF9A3C';
    } else {
      expiryEl.textContent = 'Your link expires in ' + diffDays + ' day' + (diffDays !== 1 ? 's' : '') + '.';
    }
  } else {
    expiryEl.textContent = 'Your video link expires in 7 days.';
  }

  // ── PERSONALIZE ───────────────────────────────────────────────
  const heroEl = document.getElementById('heroName');
  if (guestName) {
    heroEl.textContent = guestName.toUpperCase() + "'S STORY";
    document.title = guestName + "'s Story — epixAI Studio";
  }

  // ── ELEMENTS ──────────────────────────────────────────────────
  const videoWrap   = document.getElementById('videoWrap');
  const video       = document.getElementById('mainVideo');
  const shimmer     = document.getElementById('shimmer');
  const playOverlay = document.getElementById('playOverlay');
  const ctaRow      = document.getElementById('ctaRow');
  const downloadBtn = document.getElementById('downloadBtn');
  const shareSection = document.getElementById('shareSection');
  const errorState  = document.getElementById('errorState');

  // ── NO VIDEO PARAM ────────────────────────────────────────────
  if (!videoUrl) {
    videoWrap.classList.add('hidden');
    errorState.classList.add('visible');
    return;
  }

  // ── LOAD VIDEO ────────────────────────────────────────────────
  video.src = videoUrl;
  video.style.display = 'block';

  video.addEventListener('loadedmetadata', function () {
    shimmer.classList.add('hidden');
    ctaRow.style.display = 'flex';
    shareSection.style.display = 'block';
    downloadBtn.href = videoUrl;
  });

  video.addEventListener('error', function () {
    shimmer.classList.add('hidden');
    videoWrap.classList.add('hidden');
    errorState.classList.add('visible');
  });

  // ── PLAY OVERLAY ──────────────────────────────────────────────
  playOverlay.addEventListener('click', function () {
    video.play();
    playOverlay.classList.add('hidden');
  });

  video.addEventListener('play', function () {
    playOverlay.classList.add('hidden');
  });

  video.addEventListener('pause', function () {
    playOverlay.classList.remove('hidden');
  });

  // ── SHARE LINKS ───────────────────────────────────────────────
  const encodedPage  = encodeURIComponent(pageUrl);
  const encodedVideo = encodeURIComponent(videoUrl);

  // Facebook
  document.getElementById('fbBtn').href =
    'https://www.facebook.com/sharer/sharer.php?u=' + encodedPage;

  // LinkedIn
  document.getElementById('liBtn').href =
    'https://www.linkedin.com/sharing/share-offsite/?url=' + encodedPage;

  // Instagram — no direct web share API; open app or download first
  const igBtn = document.getElementById('igBtn');
  igBtn.addEventListener('click', function (e) {
    e.preventDefault();
    // On mobile: trigger native share which can open IG
    if (navigator.share) {
      navigator.share({ title: (guestName ? guestName + "'s Story" : 'My Story') + ' — epixAI', url: pageUrl })
        .catch(() => {});
    } else {
      // Fallback: copy link + show message
      navigator.clipboard.writeText(pageUrl).then(function () {
        igBtn.querySelector('span') && (igBtn.querySelector('span').textContent = 'Link copied!');
        setTimeout(() => igBtn.querySelector('span') && (igBtn.querySelector('span').textContent = 'Instagram'), 2000);
      }).catch(() => {
        window.open('https://www.instagram.com/', '_blank');
      });
    }
  });

  // Snapchat — download first, then snap it
  const snapBtn = document.getElementById('snapBtn');
  snapBtn.href = 'https://www.snapchat.com/';
  snapBtn.addEventListener('click', function (e) {
    e.preventDefault();
    // Trigger download first, open Snapchat
    const a = document.createElement('a');
    a.href = videoUrl;
    a.download = 'epixai-story.mp4';
    a.click();
    setTimeout(() => window.open('https://www.snapchat.com/', '_blank'), 800);
  });

  // Copy link
  const copyBtn     = document.getElementById('copyBtn');
  const copyConfirm = document.getElementById('copyConfirm');

  copyBtn.addEventListener('click', function () {
    navigator.clipboard.writeText(pageUrl).then(function () {
      copyConfirm.classList.add('show');
      setTimeout(() => copyConfirm.classList.remove('show'), 2000);
    }).catch(function () {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = pageUrl;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyConfirm.classList.add('show');
      setTimeout(() => copyConfirm.classList.remove('show'), 2000);
    });
  });

  // ── NATIVE SHARE (mobile) ─────────────────────────────────────
  if (navigator.share) {
    const row = document.getElementById('nativeShareRow');
    row.style.display = 'block';
    document.getElementById('nativeShareBtn').addEventListener('click', function () {
      navigator.share({
        title: (guestName ? guestName + "'s Story" : 'My Story') + ' — epixAI Studio',
        text: 'Check out my personalized AI short film from epixAI Studio!',
        url: pageUrl
      }).catch(() => {});
    });
  }

})();
</script>
</body>
</html>
