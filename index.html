<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>epixAI Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #080808;
      color: #fff;
      font-family: "Inter", sans-serif;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    body::before {
      content: "";
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(255,106,0,0.10) 0%, transparent 70%);
      pointer-events: none;
    }
    .wrap { position: relative; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
    .logo-img {
      width: min(560px, 88vw);
      height: auto;
      display: block;
    }
    p {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo-img" src="./logo.png" alt="epixAI Studio" />
    <p>Something cinematic is coming</p>
  </div>
</body>
</html>
